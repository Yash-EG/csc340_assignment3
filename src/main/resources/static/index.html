<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <link href="src/output.css" rel="stylesheet">
</head>
<body class="bg-cover bg-center bg-no-repeat bg-fixed min-h-screen" style="background-image: url('images/gem2.png')">

  <nav class="bg-white/10 backdrop-blur-md border-b-2 border-white/20 text-gray-100 p-2 relative">
    <div class="flex justify-between items-center px-8 p-1">
      <div class="flex-1">
        <div class="text-2xl tracking-widest text-gray-100" style="font-family: 'Orbitron', sans-serif;">
          ANTIHERO'S
        </div>
      </div>
      <div class="flex-1 max-w-md mx-8 relative">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
        </svg>
        <input
          type="text"
          id="search"
          placeholder="Search by name..."
          class="w-full p-1 pl-10 pr-4 h-10 rounded-full bg-black/30 border border-white/30 text-white text-sm placeholder-gray-400 focus:outline-none focus:border-white/50 focus:shadow-[0_0_10px_rgba(255,255,255,0.15)] transition-all"
        >
      </div>
      <div class="flex gap-6 flex-1 justify-end">
        <a class="relative hover:text-white hover:scale-105 transition-all before:content-[''] before:absolute before:-bottom-1 before:left-1/2 before:-translate-x-1/2 before:w-1 before:h-1 before:bg-white before:rounded-full before:opacity-0 hover:before:opacity-100 before:transition-opacity" href="index.html">Home</a>
        <a class="relative hover:text-white hover:scale-105 transition-all before:content-[''] before:absolute before:-bottom-1 before:left-1/2 before:-translate-x-1/2 before:w-1 before:h-1 before:bg-white before:rounded-full before:opacity-0 hover:before:opacity-100 before:transition-opacity" href="about.html">About</a>
        <a class="relative hover:text-white hover:scale-105 transition-all before:content-[''] before:absolute before:-bottom-1 before:left-1/2 before:-translate-x-1/2 before:w-1 before:h-1 before:bg-white before:rounded-full before:opacity-0 hover:before:opacity-100 before:transition-opacity" href="new-character-form.html">+ Add Character</a>
      </div>
    </div>
  </nav>

  <!-- Universe Filter Bar -->
  <div class="bg-black/30 backdrop-blur-sm border-b border-white/10 px-8 py-3 flex items-center gap-4">
    <span class="text-gray-400 text-xs font-mono tracking-widest uppercase">Universe:</span>
    <select
      id="universe-filter"
      class="p-2 rounded-lg bg-black/60 border border-white/20 text-white text-sm focus:outline-none focus:border-cyan-400 transition-all"
    >
      <option value="">All</option>
    </select>
  </div>

  <!-- Characters Carousel -->
  <div class="relative flex items-center min-h-[96vh] overflow-hidden">

    <!-- Left Arrow -->
    <button id="arrow-left" onclick="scrollCards(-1)" style="
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      z-index: 20; width: 48px; height: 120px;
      background: rgba(0,0,0,0.65); color: white; font-size: 2.5rem;
      border: 1px solid rgba(255,255,255,0.25); border-radius: 12px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s, background 0.2s;">
      &#8249;
    </button>

    <!-- Scroll Container -->
    <div id="characters-grid"
      class="flex gap-4 w-full px-4 py-4"
      style="overflow-x: scroll; scroll-behavior: smooth; scrollbar-width: none; -ms-overflow-style: none;">
      <p class="text-gray-400 text-center py-16 text-lg w-full">Loading characters...</p>
    </div>
    <style>#characters-grid::-webkit-scrollbar { display: none; }</style>

    <!-- Right Arrow -->
    <button id="arrow-right" onclick="scrollCards(1)" style="
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      z-index: 20; width: 48px; height: 120px;
      background: rgba(0,0,0,0.65); color: white; font-size: 2.5rem;
      border: 1px solid rgba(255,255,255,0.25); border-radius: 12px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: opacity 0.2s, background 0.2s;">
      &#8250;
    </button>

  </div>

  <script src="js/script.js"></script>
</body>
</html>
